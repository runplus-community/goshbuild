name: ci

on:
  push:
  pull_request:

jobs:
  unix:
    name: Unix / macOS
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Make bash packer executable
        run: chmod +x goshbuild.sh
        shell: bash

      - name: Validate bash packer
        run: bash -n goshbuild.sh
        shell: bash

      - name: Pack demo app
        run: ./goshbuild.sh pack ./demo-app ./demo-app/demo-app.run.sh
        shell: bash

      - name: Run demo acceptance tests
        run: bash ./demo-app/demo-app.run.sh.test.sh
        shell: bash

  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Validate PowerShell packers
        shell: pwsh
        run: |
          [void][scriptblock]::Create((Get-Content -Raw -LiteralPath '.\goshbuild.ps1'))

      - name: Pack demo app
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\goshbuild.ps1 pack .\demo-app .\demo-app\demo-app.run.sh

      - name: Run demo acceptance tests
        shell: pwsh
        run: bash .\demo-app\demo-app.run.sh.test.sh
